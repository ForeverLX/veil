# Cerberus Edge Node sysctl settings
# /etc/sysctl.d/99-nightforge.conf
#
# Apply: sudo sysctl -p /etc/sysctl.d/99-nightforge.conf

# Use swap only under real memory pressure (0-100, default 60)
vm.swappiness=10

# Allow rootless Podman to bind privileged ports down to 22
# Required for Cowrie honeypot to listen on port 22 as a non-root user
net.ipv4.ip_unprivileged_port_start=22
