- Cerberus Metrics:
    - Cerberus Live Graphs:
        icon: /icons/netdata.png
        href: https://netdata.lan
        description: Live System Graphs
        widget:
          type: iframe
          src: https://netdata.lan/v3/#after=-300;theme=slate
          classes: h-96 w-full
          allowScrolling: yes
- Cerberus Threat Intel:
    - Suricata IDS:
        icon: /icons/suricata.svg
        href: https://netdata.lan
        description: Network Intrusion Detection
        widget:
          type: netdata
          url: http://host.containers.internal:19999
          node: b-k3s
          chart: system.cpu
    - Cowrie Honeypot:
        icon: /icons/cowrie.svg
        href: https://netdata.lan
        description: SSH/Telnet Deception Layer
        widget:
          type: netdata
          url: http://host.containers.internal:19999
          node: b-k3s
          chart: net.eth0
    - NightForge Shield:
        icon: /icons/shield.svg
        href: "#"
        description: Scan Queue — Phase 4

