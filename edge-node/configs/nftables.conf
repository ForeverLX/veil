#!/usr/bin/nft -f
# vim:set ts=2 sw=2 et:
flush ruleset
table inet filter {
  # Banned IPs (populated by nightforge-shield)
  set blackhole {
    type ipv4_addr
    flags timeout
  }
  chain input {
    type filter hook input priority filter; policy drop;
    # 1. Drop banned IPs immediately
    ip saddr @blackhole counter drop
    # 2. Established/related traffic
    ct state established,related accept
    # 3. Loopback
    iif "lo" accept
    # 4. Pasta container networking (host.containers.internal)
    ip saddr 169.254.0.0/16 accept
    # 5. ICMP
    ip protocol icmp accept
    # 6. Management -- LAN only (recovery path if WireGuard is down)
    ip saddr 192.168.1.0/24 tcp dport 2121 accept
    # 7. Internal services -- WireGuard only
    ip saddr 10.0.0.0/24 tcp dport 2222 accept        # Gitea SSH
    ip saddr 10.0.0.0/24 tcp dport 8282 accept        # Homepage
    ip saddr 10.0.0.0/24 tcp dport 61208 accept        # Glances
    ip saddr 10.0.0.0/24 tcp dport 3000 accept        # Gitea
    ip saddr 10.0.0.0/24 tcp dport 8081 accept        # Vaultwarden
    ip saddr 10.0.0.0/24 tcp dport 8888 accept        # SearXNG
    # 8. DNS, Caddy, Pi-hole -- LAN only
    ip saddr 192.168.1.0/24 tcp dport { 80, 443, 8083 } accept
    ip saddr 192.168.1.0/24 udp dport 53 accept
    ip saddr 192.168.1.0/24 tcp dport 53 accept
    ip saddr 10.0.0.0/24 udp dport 53 accept
    ip saddr 10.0.0.0/24 tcp dport 53 accept
    ip saddr 192.168.1.0/24 udp dport { 67, 123 } accept
    # 9. WireGuard -- any source (peers must be able to reach this)
    udp dport 51820 accept
    #10. Rate Limit 
    tcp dport 22 ct state new limit rate 10/minute burst 5 packets accept

    # 11. Default drop counter
    counter drop
  }
  chain forward {
    type filter hook forward priority filter; policy drop;
    # Pasta container networking
    ip saddr 169.254.0.0/16 accept
    ip daddr 169.254.0.0/16 accept
    # Cerberus networking
    iif "wg0" accept
    oif "wg0" accept
  }
  chain output {
    type filter hook output priority filter; policy accept;
  }
}
